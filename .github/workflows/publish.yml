name: publish

# Publishes all public packages to npm.
# - On push to `main`: stable release, dist-tag `latest`.
# - On push to `next`: prerelease channel, dist-tag `next` (does NOT touch
#   `latest`; install with `npm i @agent-plan/core@next`).
# Idempotent: each package is published only if its current version is not
# already on npm (checked via `npm view <name>@<version>`), so re-runs and
# pushes without version bumps are no-ops.
#
# Use prerelease versions on `next` (e.g. 0.2.19-next.0, next.1, ...) since
# npm rejects re-publishing the same version. Bump with `pnpm release:next`.

on:
  push:
    branches: [main, next]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '25'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & typecheck (core, mcp, server, agent-plan, web-ui)
        run: pnpm build && pnpm check

      - name: Build pi-adapter (web-ui-dist + adapter)
        run: pnpm build:pi-adapter

      - name: Publish (skip already-published versions)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "❌ NPM_TOKEN secret is not set."
            echo "   Repo → Settings → Secrets and variables → Actions → New repository secret"
            echo "   Name: NPM_TOKEN   Value: an npm Automation/Granular token with publish permission."
            exit 1
          fi

          # Dist-tag: `next` branch → next (prerelease channel); main → latest (stable).
          if [ "${GITHUB_REF}" = "refs/heads/next" ]; then
            NPM_TAG="next"
          else
            NPM_TAG="latest"
          fi
          echo "Publishing with npm dist-tag: ${NPM_TAG}"

          publish_pkg() {
            local dir="$1"
            local name ver priv
            name=$(node -p "require('./${dir}/package.json').name")
            ver=$(node -p "require('./${dir}/package.json').version")
            priv=$(node -p "require('./${dir}/package.json').private || false")

            if [ "$priv" = "true" ]; then
              echo "private  → ${name} (skip)"
              return 0
            fi

            if npm view "${name}@${ver}" >/dev/null 2>&1; then
              echo "skip     → ${name}@${ver} (already on npm)"
              return 0
            fi

            echo "publish  → ${name}@${ver} (tag: ${NPM_TAG})"
            pnpm --filter "${name}" publish --access public --no-git-checks --tag "${NPM_TAG}"
          }

          # Order matters for clarity only: each package is independent at
          # publish time. pnpm resolves workspace:* ranges automatically.
          publish_pkg packages/plan-core
          publish_pkg packages/plan-mcp
          publish_pkg packages/plan-server
          publish_pkg packages/agent-plan
          publish_pkg packages/pi-adapter
